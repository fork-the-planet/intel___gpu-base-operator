<svg width="1020" height="660" viewBox="0 0 1020 660" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0068B5"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#BF360C"/>
    </marker>
  </defs>

  <!-- Kubernetes Cluster boundary -->
  <rect x="10" y="10" width="1000" height="640" rx="14"
        fill="#F5F9FF" stroke="#326CE5" stroke-width="2.5" stroke-dasharray="10,5"/>
  <text x="28" y="34" font-size="14" fill="#326CE5" font-weight="bold">&#x2388;  Kubernetes Cluster</text>

  <!-- ── User-defined CRDs ── -->
  <text x="55" y="50" font-size="11" fill="#666" font-style="italic">User-defined Custom Resources (intel.com/v1alpha1):</text>

  <!-- ClusterPolicy CR -->
  <rect x="50" y="56" width="215" height="60" rx="8"
        fill="#E3F2FD" stroke="#0068B5" stroke-width="1.5"/>
  <text x="157" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#0068B5">ClusterPolicy</text>
  <text x="65" y="92" font-size="10" fill="#444">resourceRegistration: dp | dra</text>
  <text x="65" y="107" font-size="10" fill="#444">resourceMonitoring, useNFDLabeling, …</text>

  <!-- GPUFirmwareUpdate CR -->
  <rect x="295" y="56" width="215" height="60" rx="8"
        fill="#E3F2FD" stroke="#0068B5" stroke-width="1.5"/>
  <text x="402" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#0068B5">GPUFirmwareUpdate</text>
  <text x="310" y="92" font-size="10" fill="#444">nodeSelector, fwImageTag</text>
  <text x="310" y="107" font-size="10" fill="#444">retryLimit, timeout</text>

  <!-- CRs → Admission Webhook arrows -->
  <path d="M 157,116 V 128" stroke="#0068B5" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <path d="M 402,116 V 128" stroke="#0068B5" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>

  <!-- ── Admission Webhook (between CRDs and operator) ── -->
  <rect x="30" y="128" width="545" height="42" rx="8"
        fill="#F1F8E9" stroke="#66BB6A" stroke-width="1.8"/>
  <text x="302" y="147" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">&#x1F512;  Admission Webhook</text>
  <text x="302" y="162" text-anchor="middle" font-size="10" fill="#444">Validates ClusterPolicy &amp; GPUFirmwareUpdate on create / update — rejects malformed CRs</text>

  <!-- Webhook → Operator arrow -->
  <path d="M 302,170 V 180" stroke="#0068B5" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>

  <!-- ── Intel GPU Base Operator ── -->
  <rect x="30" y="180" width="545" height="242" rx="10"
        fill="#E8F4FD" stroke="#0068B5" stroke-width="2"/>
  <rect x="30" y="180" width="545" height="34" rx="10" fill="#0068B5"/>
  <rect x="30" y="198" width="545" height="16" fill="#0068B5"/>
  <text x="302" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Intel GPU Base Operator  (controller-manager)</text>

  <!-- ClusterPolicy Controller sub-box -->
  <rect x="50" y="218" width="280" height="196" rx="7"
        fill="white" stroke="#2196F3" stroke-width="1.5"/>
  <rect x="50" y="218" width="280" height="26" rx="7" fill="#2196F3"/>
  <rect x="50" y="230" width="280" height="14" fill="#2196F3"/>
  <text x="190" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="white">ClusterPolicy Controller</text>

  <text x="66" y="260" font-size="10" fill="#333">• Device Plugin Reconciler</text>
  <text x="66" y="276" font-size="10" fill="#333">• DRA Reconciler</text>
  <text x="66" y="292" font-size="10" fill="#333">• XPU-Manager Reconciler</text>
  <text x="66" y="308" font-size="10" fill="#333">• Misc / NFD Rule Reconciler</text>
  <text x="66" y="324" font-size="10" fill="#333">• Kueue Reconciler</text>
  <line x1="66" y1="333" x2="322" y2="333" stroke="#DDD" stroke-width="1"/>
  <text x="66" y="348" font-size="10" fill="#888" font-style="italic">Detects at startup: DRA · OpenShift · Prometheus · Kueue</text>
  <text x="66" y="363" font-size="10" fill="#888" font-style="italic">Enables / disables reconcilers accordingly</text>
  <text x="66" y="378" font-size="10" fill="#888" font-style="italic">Watches one ClusterPolicy per cluster</text>
  <text x="66" y="393" font-size="10" fill="#888" font-style="italic">Reconciles on CR create / update / delete</text>

  <!-- FWUpdate Controller sub-box -->
  <rect x="346" y="218" width="200" height="122" rx="7"
        fill="white" stroke="#2196F3" stroke-width="1.5"/>
  <rect x="346" y="218" width="200" height="26" rx="7" fill="#2196F3"/>
  <rect x="346" y="230" width="200" height="14" fill="#2196F3"/>
  <text x="446" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="white">FWUpdate Controller</text>

  <text x="362" y="260" font-size="10" fill="#333">• Firmware Job (per node, per CR)</text>
  <text x="362" y="276" font-size="10" fill="#333">• Node taint / untaint</text>
  <text x="362" y="292" font-size="10" fill="#333">• Node selection</text>
  <text x="362" y="308" font-size="10" fill="#333">• Status / conditions reporting</text>

  <!-- ── Managed K8s Resources (right column) ── -->
  <text x="811" y="192" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Managed K8s Resources</text>

  <!-- Stem: operator right → vertical rail → branches -->
  <path d="M 575,295 H 600" stroke="#666" stroke-width="1.5" fill="none"/>
  <line x1="600" y1="217" x2="600" y2="373" stroke="#999" stroke-width="1"/>

  <path d="M 600,217 H 626" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 600,269 H 626" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 600,321 H 626" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 600,373 H 626" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- DaemonSet boxes (title only, no subtext) -->
  <rect x="632" y="198" width="358" height="38" rx="7"
        fill="#FFF8E1" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="811" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#B45309">DaemonSet: Intel GPU Device Plugin</text>

  <rect x="632" y="250" width="358" height="38" rx="7"
        fill="#FFF8E1" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="811" y="274" text-anchor="middle" font-size="11" font-weight="bold" fill="#B45309">DaemonSet: DRA Plugin</text>

  <rect x="632" y="302" width="358" height="38" rx="7"
        fill="#FFF8E1" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="811" y="326" text-anchor="middle" font-size="11" font-weight="bold" fill="#B45309">DaemonSet: Intel XPU-Manager</text>

  <rect x="632" y="354" width="358" height="38" rx="7"
        fill="#FFF8E1" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="811" y="378" text-anchor="middle" font-size="11" font-weight="bold" fill="#B45309">Job: GPU Firmware Update</text>

  <!-- ── Cluster dependencies ── -->
  <text x="55" y="436" font-size="11" fill="#666" font-style="italic">Cluster dependencies &amp; integrations:</text>

  <rect x="30" y="444" width="155" height="68" rx="8"
        fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="107" y="465" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">cert-manager</text>
  <text x="107" y="481" text-anchor="middle" font-size="10" fill="#444">Webhook TLS</text>
  <text x="107" y="496" text-anchor="middle" font-size="10" fill="#444">certificate provisioning</text>

  <rect x="225" y="444" width="155" height="68" rx="8"
        fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="302" y="465" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Node Feature</text>
  <text x="302" y="481" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Discovery</text>
  <text x="302" y="496" text-anchor="middle" font-size="10" fill="#444">applies GPU node labels</text>

  <rect x="420" y="444" width="155" height="68" rx="8"
        fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="497" y="465" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Kueue</text>
  <text x="497" y="481" text-anchor="middle" font-size="10" fill="#444">workload queueing</text>
  <text x="497" y="496" text-anchor="middle" font-size="10" fill="#444">&amp; resource reservation</text>

  <!-- ── GPU Worker Nodes ── -->
  <rect x="30" y="524" width="960" height="118" rx="10"
        fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="510" y="545" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">GPU Worker Nodes</text>

  <rect x="48" y="552" width="210" height="80" rx="6" fill="white" stroke="#F57C00" stroke-width="1.2"/>
  <text x="153" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Device Plugin</text>
  <text x="153" y="586" text-anchor="middle" font-size="10" fill="#555">gpu.intel.com/i915 extended resource</text>
  <text x="153" y="601" text-anchor="middle" font-size="10" fill="#555">LevelZero health checks</text>
  <text x="153" y="616" text-anchor="middle" font-size="10" fill="#555">scheduling via kubelet</text>

  <rect x="270" y="552" width="210" height="80" rx="6" fill="white" stroke="#F57C00" stroke-width="1.2"/>
  <text x="375" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">DRA Plugin</text>
  <text x="375" y="586" text-anchor="middle" font-size="10" fill="#555">ResourceSlice · driver: gpu.intel.com</text>
  <text x="375" y="601" text-anchor="middle" font-size="10" fill="#555">health via XPU-Manager</text>
  <text x="375" y="616" text-anchor="middle" font-size="10" fill="#555">scheduling via ResourceClaim</text>

  <rect x="492" y="552" width="210" height="80" rx="6" fill="white" stroke="#F57C00" stroke-width="1.2"/>
  <text x="597" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">XPU-Manager</text>
  <text x="597" y="586" text-anchor="middle" font-size="10" fill="#555">per-GPU telemetry &amp; health</text>
  <text x="597" y="601" text-anchor="middle" font-size="10" fill="#555">metrics endpoint (REST/gRPC)</text>
  <text x="597" y="616" text-anchor="middle" font-size="10" fill="#555">scraped by Prometheus</text>

  <rect x="714" y="552" width="258" height="80" rx="6" fill="white" stroke="#F57C00" stroke-width="1.2"/>
  <text x="843" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Node Labels &amp; Scheduling</text>
  <text x="843" y="586" text-anchor="middle" font-size="10" fill="#555">intel.feature.node.kubernetes.io/gpu=true</text>
  <text x="843" y="601" text-anchor="middle" font-size="10" fill="#555">set by Node Feature Discovery</text>
  <text x="843" y="616" text-anchor="middle" font-size="10" fill="#555">nodeSelector + Kueue queuing</text>

  <!-- DaemonSets → GPU Nodes arrow -->
  <path d="M 811,394 V 520" stroke="#BF360C" stroke-width="1.5" fill="none"
        marker-end="url(#arr-orange)"/>
  <text x="840" y="464" font-size="10" fill="#BF360C" font-style="italic">deployed to</text>
  <text x="840" y="477" font-size="10" fill="#BF360C" font-style="italic">/ runs on</text>
</svg>

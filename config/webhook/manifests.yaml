---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-intel-com-v1alpha1-clusterpolicy
  failurePolicy: Fail
  name: mclusterpolicy-v1alpha1.kb.io
  rules:
  - apiGroups:
    - intel.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - clusterpolicies
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-intel-com-v1alpha1-clusterpolicy
  failurePolicy: Fail
  name: vclusterpolicy-v1alpha1.kb.io
  rules:
  - apiGroups:
    - intel.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - clusterpolicies
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-intel-com-v1alpha1-gpufirmwareupdate
  failurePolicy: Fail
  name: vgpufirmwareupdate-v1alpha1.kb.io
  rules:
  - apiGroups:
    - intel.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - gpufirmwareupdates
  sideEffects: None

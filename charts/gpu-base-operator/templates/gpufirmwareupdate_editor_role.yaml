# This rule is not used by the project intel-gpu-base-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the intel.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: intel-gpu-base-operator
    app.kubernetes.io/managed-by: kustomize
  name: gpufirmwareupdate-editor-role
rules:
- apiGroups:
  - intel.com
  resources:
  - gpufirmwareupdates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - intel.com
  resources:
  - gpufirmwareupdates/status
  verbs:
  - get
